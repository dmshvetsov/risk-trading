name = "rfq-server"
main = "src/index.ts"
compatibility_date = "2026-06-10"
preview_urls = false
workers_dev = false

#
# = development env
#

[[d1_databases]]
binding = "DB"
database_name = "rfq-server-db-development"
database_id = "local-rfq-server-db"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "QUOTES"
class_name = "QuoteStore"

[[queues.producers]]
binding = "BROADCAST_QUEUE"
queue = "broadcast-server-submissions-development"

[vars]
SUI_RPC_URL = "https://fullnode.testnet.sui.io:443"
OTP_PACKAGE_ID="0xb955fddbc6a8a2ebb39c8d2b38c9dcbb21e5148458470221bc811de674ab4ee4"
OPERATION_FEE_BPS = "500"

[[queues.consumers]]
queue = "broadcast-server-submissions-development"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 1

#
# = production env
#

[env.production.observability]
enabled = true
head_sampling_rate = 1

[[env.production.d1_databases]]
binding = "DB"
database_name = "rfq-server-db"
database_id = "e40f7b2f-6be9-4822-ac8f-0c9a14a8e4fe"
migrations_dir = "migrations"

[[env.production.durable_objects.bindings]]
name = "QUOTES"
class_name = "QuoteStore"

[env.production.vars]
SUI_RPC_URL = "https://fullnode.mainnet.sui.io:443"
OTP_PACKAGE_ID="0xb955fddbc6a8a2ebb39c8d2b38c9dcbb21e5148458470221bc811de674ab4ee4"
OPERATION_FEE_BPS = "500"

[[env.production.queues.producers]]
binding = "BROADCAST_QUEUE"
queue = "rfq-server-broadcast"

[[env.production.queues.consumers]]
queue = "rfq-server-broadcast"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 1

#
# = staging env
#

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[[env.staging.d1_databases]]
binding = "DB"
database_name = "rfq-server-db-testnet"
database_id = "d3e806a6-9263-46c1-ad74-7c92c9d1c15f"

[[env.staging.durable_objects.bindings]]
name = "QUOTES"
class_name = "QuoteStore"

[env.staging.vars]
SUI_RPC_URL = "https://fullnode.testnet.sui.io:443"
OTP_PACKAGE_ID="0xb955fddbc6a8a2ebb39c8d2b38c9dcbb21e5148458470221bc811de674ab4ee4"
OPERATION_FEE_BPS = "500"

[[env.staging.queues.producers]]
binding = "BROADCAST_QUEUE"
queue = "rfq-server-broadcast-staging"

[[env.staging.queues.consumers]]
queue = "rfq-server-broadcast-staging"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 1

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["QuoteStore"]

#
# = migrations
#

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuoteStore"]
